<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: #f0f0f0; padding: 24px 16px 48px; }
  h1 { text-align: center; font-size: 1.5rem; font-weight: 900; color: #333; margin-bottom: 28px; letter-spacing: -0.3px; }

  /* ── Campaign Block ── */
  .campaign-block { margin-bottom: 36px; }
  .campaign-title {
    font-size: 1.05rem; font-weight: 900; margin-bottom: 10px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .tab-btn {
    padding: 6px 18px; border-radius: 20px; border: 2px solid; cursor: pointer;
    font-family: 'Nunito', sans-serif; font-size: 0.78rem; font-weight: 800;
    transition: background 0.18s, color 0.18s;
  }
  .tab-btn.active { color: #fff; }

  /* ── Cards Row ── */
  .cards-row {
    display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-start;
  }

  /* ── Donut Card ── */
  .donut-card {
    border-radius: 18px; padding: 16px 18px 14px;
    min-width: 178px; max-width: 210px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .card-title {
    font-size: 0.72rem; font-weight: 800; color: rgba(255,255,255,0.95);
    text-transform: uppercase; letter-spacing: 0.4px; line-height: 1.3;
  }
  .donut-wrap {
    position: relative; width: 100px; height: 100px; flex-shrink: 0; margin: 0 auto;
  }
  .donut-wrap canvas { width: 100px !important; height: 100px !important; }
  .donut-pct {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 17px; font-weight: 900; color: #fff;
    pointer-events: none; white-space: nowrap;
  }
  .legend {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
  }
  .legend-item {
    display: flex; align-items: center; gap: 4px;
    font-size: 0.68rem; font-weight: 700; color: rgba(255,255,255,0.9);
  }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .materials-list {
    display: flex; flex-wrap: wrap; gap: 5px;
  }
  .mat-chip {
    background: rgba(255,255,255,0.22); color: rgba(255,255,255,0.95);
    border-radius: 8px; padding: 2px 8px; font-size: 0.62rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.2px;
  }

  /* ── Dates Card ── */
  .dates-card {
    border-radius: 18px; padding: 16px 16px 14px;
    width: 145px; flex-shrink: 0; display: flex; flex-direction: column; gap: 10px;
  }
  .dates-card-title {
    font-size: 0.72rem; font-weight: 800; color: #555;
    text-transform: uppercase; letter-spacing: 0.4px;
  }
  .date-item { border-radius: 10px; padding: 8px 10px; }
  .date-label { font-size: 0.6rem; font-weight: 800; color: #777; text-transform: uppercase; letter-spacing: 0.3px; }
  .date-value { font-size: 0.78rem; font-weight: 900; color: #444; margin-top: 2px; }

  /* ── View Pane ── */
  .view-pane { display: none; }
  .view-pane.active { display: block; }
</style>

// ── COLORS ───────────────────────────────────────────────────────────────────
function campaignColors(name) {
  const n = name.toUpperCase();
  if (n.includes('ECLIPSE') || n.includes('VIBRIN'))
    return { accent:'#e85d45', cardBg:'#fde8e4', datesBg:'#fcd6d0' };
  if (n.includes('VELO'))
    return { accent:'#3ab4e0', cardBg:'#daf0fb', datesBg:'#b8e3f5' };
  if (n.includes('VUSE'))
    return { accent:'#7c4fcc', cardBg:'#ede4fc', datesBg:'#d9c8f7' };
  return { accent:'#5b7fa6', cardBg:'#e4eaf3', datesBg:'#ccd5e3' };
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function fmtDate(str) {
  if (!str || str === 'null' || str === 'TBD') return '–';
  const d = new Date(str);
  if (isNaN(d)) return '–';
  return d.toLocaleDateString('es-PE', { day:'2-digit', month:'short', year:'numeric' });
}

function maxDate(a, b) {
  if (!a) return b;
  if (!b) return a;
  return new Date(a) >= new Date(b) ? a : b;
}

function minDate(a, b) {
  if (!a) return b;
  if (!b) return a;
  return new Date(a) <= new Date(b) ? a : b;
}

// ── PROCESS CAMPAIGN DATA ────────────────────────────────────────────────────
// Re-classify: ps=B2B → B2B Material
function reClassify(rows) {
  return rows.map(r => {
    let cat = r.category;
    if (r.ps === 'B2B') cat = 'B2B Material';
    return { ...r, category: cat };
  });
}

const CAT_ORDER = ['B2B Material','Primary POP','Secondary POP','Special Implementations'];

function groupByCategory(rows, viewType) {
  // viewType: 'prog' = Programación, 'efec' = Efectividad
  const cats = {};
  for (const row of rows) {
    const c = row.category;
    if (!cats[c]) cats[c] = { total_ref: 0, completed: 0, materials: new Set() };
    if (viewType === 'prog') {
      cats[c].total_ref  += row.total_pos;
      cats[c].completed  += row.pos_visit;
    } else {
      cats[c].total_ref  += row.pos_visit;
      cats[c].completed  += row.pos_done;
    }
    cats[c].materials.add(row.material);
  }
  // Sort by CAT_ORDER
  return CAT_ORDER.filter(c => cats[c]).map(c => ({ cat: c, ...cats[c], materials: [...cats[c].materials] }));
}

function getDates(rows) {
  let minInit = null, maxDeadline = null;
  for (const r of rows) {
    const d = r.init_date && r.init_date !== 'TBD' ? r.init_date : null;
    const dl = r.deadline && r.deadline !== 'TBD' ? r.deadline : null;
    const ndl = r.new_deadline && r.new_deadline !== 'TBD' ? r.new_deadline : null;
    if (d) minInit = minDate(minInit, d);
    const projEnd = maxDate(dl, ndl);
    if (projEnd) maxDeadline = maxDate(maxDeadline, projEnd);
  }
  return { kickoff: minInit, projEnd: maxDeadline };
}

// ── DONUT CHART ID COUNTER ────────────────────────────────────────────────────
let chartIdCounter = 0;
const allCharts = {};

function renderDonutCard(catData, colors, viewType) {
  const id = 'donut_' + (++chartIdCounter);
  const total = catData.total_ref;
  const comp = Math.min(catData.completed, total);
  const pend = Math.max(total - comp, 0);
  const pct = total > 0 ? Math.round(comp / total * 100) : 0;

  const mats = catData.materials.map(m => `<span class="mat-chip">${m}</span>`).join('');

  return `
    <div class="donut-card" style="background:${colors.accent};">
      <div class="card-title">${catData.cat}<br><span style="font-size:0.65rem;opacity:0.85">${Math.round(total).toLocaleString()} POS ref.</span></div>
      <div class="donut-wrap">
        <canvas id="${id}"></canvas>
        <div class="donut-pct">${pct}%</div>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:rgba(255,255,255,0.25)"></div>Pending</div>
        <div class="legend-item"><div class="legend-dot" style="background:rgba(255,255,255,0.92)"></div>Completed</div>
      </div>
      <div class="materials-list">${mats}</div>
    </div>`;
}

function renderDatesCard(dates, colors) {
  return `
    <div class="dates-card" style="background:${colors.cardBg};">
      <div class="dates-card-title" style="color:${colors.accent};">📅 Campaign<br>Dates</div>
      <div class="date-item" style="background:${colors.datesBg};">
        <div class="date-label">Kick off</div>
        <div class="date-value">${fmtDate(dates.kickoff)}</div>
      </div>
      <div class="date-item" style="background:${colors.datesBg};">
        <div class="date-label">Projected end</div>
        <div class="date-value">${fmtDate(dates.projEnd)}</div>
      </div>
    </div>`;
}

// ── BUILD HTML ────────────────────────────────────────────────────────────────
const container = document.body;

for (const [campaignName, rawRows] of Object.entries(RAW)) {
  const rows = reClassify(rawRows);
  const colors = campaignColors(campaignName);
  const blockId = campaignName.replace(/[^a-z0-9]/gi,'_');
  const dates = getDates(rows);

  const progGroups = groupByCategory(rows, 'prog');
  const efecGroups = groupByCategory(rows, 'efec');

  // Build donut cards HTML + track IDs
  const progCardData = progGroups.map(g => ({ g, id: chartIdCounter + 1, html: renderDonutCard(g, colors, 'prog') }));
  // After renderDonutCard runs, chartIdCounter is incremented inside
  // Re-do cleanly:
  let progCardsHtml = '';
  const progDonutData = [];
  for (const g of progGroups) {
    const id = 'donut_' + (++chartIdCounter);
    const total = g.total_ref;
    const comp = Math.min(g.completed, total);
    const pend = Math.max(total - comp, 0);
    const pct = total > 0 ? Math.round(comp / total * 100) : 0;
    progDonutData.push({ id, pend, comp, accent: colors.accent });
    const mats = g.materials.map(m => `<span class="mat-chip">${m}</span>`).join('');
    progCardsHtml += `
      <div class="donut-card" style="background:${colors.accent};">
        <div class="card-title">${g.cat}<br><span style="font-size:0.65rem;opacity:0.85">${Math.round(total).toLocaleString()} POS ref.</span></div>
        <div class="donut-wrap"><canvas id="${id}"></canvas><div class="donut-pct">${pct}%</div></div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:rgba(255,255,255,0.25)"></div>Pending</div>
          <div class="legend-item"><div class="legend-dot" style="background:rgba(255,255,255,0.92)"></div>Completed</div>
        </div>
        <div class="materials-list">${mats}</div>
      </div>`;
  }

  let efecCardsHtml = '';
  const efecDonutData = [];
  for (const g of efecGroups) {
    const id = 'donut_' + (++chartIdCounter);
    const total = g.total_ref;
    const comp = Math.min(g.completed, total);
    const pend = Math.max(total - comp, 0);
    const pct = total > 0 ? Math.round(comp / total * 100) : 0;
    efecDonutData.push({ id, pend, comp, accent: colors.accent });
    const mats = g.materials.map(m => `<span class="mat-chip">${m}</span>`).join('');
    efecCardsHtml += `
      <div class="donut-card" style="background:${colors.accent};">
        <div class="card-title">${g.cat}<br><span style="font-size:0.65rem;opacity:0.85">${Math.round(total).toLocaleString()} POS ref.</span></div>
        <div class="donut-wrap"><canvas id="${id}"></canvas><div class="donut-pct">${pct}%</div></div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:rgba(255,255,255,0.25)"></div>Pending</div>
          <div class="legend-item"><div class="legend-dot" style="background:rgba(255,255,255,0.92)"></div>Completed</div>
        </div>
        <div class="materials-list">${mats}</div>
      </div>`;
  }

  const datesCardHtml = renderDatesCard(dates, colors);

  const block = document.createElement('div');
  block.className = 'campaign-block';
  block.innerHTML = `
    <div class="campaign-title" style="color:${colors.accent};">${campaignName}</div>
    <div class="tabs">
      <button class="tab-btn active" style="border-color:${colors.accent};background:${colors.accent};color:#fff;"
        onclick="switchTab('${blockId}','prog',this,'${colors.accent}')">Programación de visitas</button>
      <button class="tab-btn" style="border-color:${colors.accent};color:${colors.accent};"
        onclick="switchTab('${blockId}','efec',this,'${colors.accent}')">Efectividad de visitas</button>
    </div>
    <div id="${blockId}_prog" class="view-pane active">
      <div class="cards-row">${progCardsHtml}${datesCardHtml}</div>
    </div>
    <div id="${blockId}_efec" class="view-pane">
      <div class="cards-row">${efecCardsHtml}${datesCardHtml}</div>
    </div>
  `;
  container.appendChild(block);

  // Store donut data for chart init
  window._donutData = window._donutData || [];
  window._donutData.push(...progDonutData, ...efecDonutData);
}

// ── TAB SWITCH ────────────────────────────────────────────────────────────────
function switchTab(blockId, view, btn, accent) {
  // Hide both panes
  document.getElementById(blockId + '_prog').classList.remove('active');
  document.getElementById(blockId + '_efec').classList.remove('active');
  document.getElementById(blockId + '_' + view).classList.add('active');

  // Update tab button styles
  const allBtns = btn.closest('.tabs').querySelectorAll('.tab-btn');
  allBtns.forEach(b => {
    b.style.background = '';
    b.style.color = accent;
  });
  btn.style.background = accent;
  btn.style.color = '#fff';

  // Initialize charts in newly shown pane if not yet done
  const pane = document.getElementById(blockId + '_' + view);
  pane.querySelectorAll('canvas').forEach(canvas => {
    if (!allCharts[canvas.id]) {
      const dd = (window._donutData || []).find(d => d.id === canvas.id);
      if (dd) initChart(dd);
    }
  });
}

// ── INIT CHARTS ───────────────────────────────────────────────────────────────
function initChart(dd) {
  const canvas = document.getElementById(dd.id);
  if (!canvas || allCharts[dd.id]) return;
  const chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      datasets: [{
        data: [dd.pend, dd.comp],
        backgroundColor: ['rgba(255,255,255,0.25)', 'rgba(255,255,255,0.92)'],
        borderWidth: 0,
        hoverOffset: 0
      }]
    },
    options: {
      responsive: false,
      cutout: '72%',
      animation: { duration: 600 },
      plugins: { legend: { display: false }, tooltip: { enabled: false } }
    }
  });
  allCharts[dd.id] = chart;
}

// Init charts for all visible panes on load
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.view-pane.active canvas').forEach(canvas => {
    const dd = (window._donutData || []).find(d => d.id === canvas.id);
    if (dd) initChart(dd);
  });
});
