<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#f0f0f0;padding:24px 20px 48px}
h1{text-align:center;font-size:22px;font-weight:800;color:#333;margin-bottom:6px;letter-spacing:-.3px}
.subtitle{text-align:center;font-size:12px;color:#888;margin-bottom:28px;font-weight:600}
.campaign-block{margin-bottom:30px}
.campaign-title{font-size:14px;font-weight:800;color:#555;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;padding-left:4px}
.tab-row{display:flex;gap:6px}
.tab-btn{padding:7px 18px;border-radius:12px 12px 0 0;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;transition:background .18s,color .18s}
.cards-wrap{border-radius:0 18px 18px 18px;padding:18px 18px 16px;display:none}
.cards-wrap.active{display:block}
.cards-row{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-start}
.pop-card{border-radius:18px;padding:14px 14px 12px;min-width:155px;max-width:200px;flex:1 1 155px;display:flex;flex-direction:column;align-items:center;gap:8px}
.card-title{font-size:11.5px;font-weight:800;text-align:center;color:rgba(255,255,255,.97);text-transform:uppercase;letter-spacing:.4px;line-height:1.3}
.donut-wrap{position:relative;width:100px;height:100px;flex-shrink:0}
.donut-wrap canvas{display:block}
.donut-pct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:17px;font-weight:900;color:white;pointer-events:none;white-space:nowrap}
.card-legend{display:flex;gap:10px;font-size:10px;font-weight:700;color:rgba(255,255,255,.9)}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle}
.legend-item{display:flex;align-items:center}
.materials-list{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;width:100%}
.mat-chip{font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,.22);color:rgba(255,255,255,.95);text-transform:uppercase;letter-spacing:.2px}
.dates-card{border-radius:18px;padding:14px 14px 12px;width:145px;flex:0 0 145px;display:flex;flex-direction:column;gap:10px}
.dates-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;text-align:center}
.date-item{border-radius:10px;padding:8px 10px}
.date-label{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;opacity:.7}
.date-value{font-size:13px;font-weight:900;margin-top:2px}
</style>

function getColors(n){
  const u=n.toUpperCase();
  if(u.includes('ECLIPSE')||u.includes('VIBRIN')) return{accent:'#e85d45',cardBg:'#fde8e4',datesBg:'#fcd6d0',textDark:'#c04a33'};
  if(u.includes('MCLAREN'))  return{accent:'#6b7280',cardBg:'#e9eaec',datesBg:'#d1d5db',textDark:'#4b5563'};
  if(u.includes('VELO'))     return{accent:'#3ab4e0',cardBg:'#daf0fb',datesBg:'#b8e3f5',textDark:'#2390b8'};
  if(u.includes('VUSE'))     return{accent:'#7c4fcc',cardBg:'#ede4fc',datesBg:'#d9c8f7',textDark:'#6235a8'};
  if(u.includes('PALL MALL')||u.includes('LS CORE')) return{accent:'#d4821a',cardBg:'#fdf0e0',datesBg:'#faddbb',textDark:'#a86212'};
  return{accent:'#5b7fa6',cardBg:'#e4eaf3',datesBg:'#ccd5e3',textDark:'#3d5e80'};
}

const B2B=['B2B','FLYER B2B','HOJA CATÁLOGO','ABANICO','DIPTICO','DÍPTICO','MENUBOARD'];
function getCat(r){
  const m=r.material.toUpperCase(),ps=(r.ps||'').toUpperCase().trim();
  if(B2B.some(k=>m.includes(k))) return'B2B Material';
  if(ps==='PRIMARY') return'Primary POP';
  if(ps.startsWith('SPECIAL')) return'Special Implementations';
  return'Secondary POP';
}

const ORDER=['B2B Material','Primary POP','Secondary POP','Special Implementations'];
function agg(rows){
  const m={};
  for(const r of rows){
    const c=getCat(r);
    if(!m[c]) m[c]={tp:0,pv:0,pd:0,mats:new Set()};
    m[c].tp+=r.total_pos; m[c].pv+=r.pos_visit; m[c].pd+=r.pos_done; m[c].mats.add(r.material);
  }
  return ORDER.filter(k=>m[k]).map(k=>({cat:k,...m[k],mats:[...m[k].mats]}));
}

function pDMY(s){if(!s)return null;const[d,mo,y]=s.split('/');return(d&&mo&&y)?new Date(+y,+mo-1,+d):null;}
function fDMY(d){return d?`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`:'—';}
function getDates(rows){
  let mi=null,mx=null;
  for(const r of rows){
    const d1=pDMY(r.initial_date),d2=pDMY(r.deadline),d3=pDMY(r.new_deadline);
    if(d1&&(!mi||d1<mi))mi=d1; if(d2&&(!mx||d2>mx))mx=d2; if(d3&&(!mx||d3>mx))mx=d3;
  }
  return{ko:fDMY(mi),pe:fDMY(mx)};
}

let ci=0; const CH=[];
function dCard(cd,view,col){
  const ref=view==='p'?cd.tp:cd.pv, done=view==='p'?cd.pv:cd.pd, pend=Math.max(0,ref-done);
  const pct=ref>0?Math.round(done/ref*100):0, id='c'+(++ci);
  CH.push({id,pend,done});
  const chips=cd.mats.map(m=>`<span class="mat-chip">${m}</span>`).join('');
  return`<div class="pop-card" style="background:${col.accent}">
    <div class="card-title">${cd.cat}<br><span style="font-weight:600;font-size:10px;opacity:.85">${ref.toLocaleString()} POS</span></div>
    <div class="donut-wrap"><canvas id="${id}" width="100" height="100"></canvas><div class="donut-pct">${pct}%</div></div>
    <div class="card-legend">
      <span class="legend-item"><span class="legend-dot" style="background:rgba(255,255,255,.25)"></span>Pending</span>
      <span class="legend-item"><span class="legend-dot" style="background:rgba(255,255,255,.92)"></span>Completed</span>
    </div>
    <div class="materials-list">${chips}</div>
  </div>`;
}
function dtCard(rows,col){
  const{ko,pe}=getDates(rows);
  return`<div class="dates-card" style="background:${col.cardBg}">
    <div class="dates-title" style="color:${col.textDark}">Campaign Dates</div>
    <div class="date-item" style="background:${col.datesBg}"><div class="date-label" style="color:${col.textDark}">Kick off</div><div class="date-value" style="color:${col.accent}">${ko}</div></div>
    <div class="date-item" style="background:${col.datesBg}"><div class="date-label" style="color:${col.textDark}">Projected end</div><div class="date-value" style="color:${col.accent}">${pe}</div></div>
  </div>`;
}
function bld(name,rows,idx){
  const col=getColors(name), cats=agg(rows);
  const pH=cats.map(c=>dCard(c,'p',col)).join('')+dtCard(rows,col);
  const eH=cats.map(c=>dCard(c,'e',col)).join('')+dtCard(rows,col);
  return`<div class="campaign-block">
    <div class="campaign-title">${name}</div>
    <div class="tab-row">
      <button id="t1_${idx}" class="tab-btn" onclick="sw(${idx},'p')" style="background:${col.accent};color:white">Programación de visitas</button>
      <button id="t2_${idx}" class="tab-btn" onclick="sw(${idx},'e')" style="background:transparent;color:${col.accent}">Efectividad de visitas</button>
    </div>
    <div id="w1_${idx}" class="cards-wrap active" style="background:${col.cardBg}"><div class="cards-row">${pH}</div></div>
    <div id="w2_${idx}" class="cards-wrap" style="background:${col.cardBg}"><div class="cards-row">${eH}</div></div>
  </div>`;
}

const NAMES=Object.keys(RAW);
function sw(idx,v){
  const col=getColors(NAMES[idx]);
  const[t1,t2,w1,w2]=['t1_','t2_','w1_','w2_'].map(p=>document.getElementById(p+idx));
  if(v==='p'){t1.style.cssText=`background:${col.accent};color:white`;t2.style.cssText=`background:transparent;color:${col.accent}`;w1.classList.add('active');w2.classList.remove('active');}
  else{t2.style.cssText=`background:${col.accent};color:white`;t1.style.cssText=`background:transparent;color:${col.accent}`;w2.classList.add('active');w1.classList.remove('active');}
}

document.addEventListener('DOMContentLoaded',function(){
  const c=document.getElementById('main');
  NAMES.forEach((n,i)=>{c.innerHTML+=bld(n,RAW[n],i);});
  requestAnimationFrame(()=>{
    CH.forEach(({id,pend,done})=>{
      const el=document.getElementById(id);
      if(!el)return;
      new Chart(el.getContext('2d'),{type:'doughnut',data:{datasets:[{data:[pend,done],backgroundColor:['rgba(255,255,255,0.25)','rgba(255,255,255,0.92)'],borderWidth:0}]},options:{responsive:false,cutout:'72%',plugins:{legend:{display:false},tooltip:{enabled:false}},animation:{duration:500}}});
    });
  });
});
</script>
<div id="main"></div>
</body>
