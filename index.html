<html lang="es">
<head>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: #f0f0f0; min-height: 100vh; padding: 24px; }

h1 { text-align: center; font-size: 22px; font-weight: 800; color: #333; margin-bottom: 24px; letter-spacing: -0.3px; }

/* ── CAMPAIGN BLOCK ── */
.campaign { margin-bottom: 28px; }
.campaign-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.campaign-title { font-size: 17px; font-weight: 800; color: #222; }
.campaign-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

/* ── TABS ── */
.tabs { display: flex; gap: 6px; margin-bottom: 14px; }
.tab {
  padding: 7px 18px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.18s;
  user-select: none;
}
.tab.inactive { background: transparent; }
.tab.active { color: #fff; }

/* ── CARDS ROW ── */
.cards-row {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  align-items: flex-start;
}

/* ── POP CARD ── */
.pop-card {
  border-radius: 18px;
  padding: 16px;
  min-width: 185px;
  flex: 1;
  max-width: 260px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.pop-card-title {
  font-size: 12px;
  font-weight: 800;
  color: #fff;
  letter-spacing: 0.2px;
  line-height: 1.3;
}
.pop-card-pos {
  font-size: 11px;
  color: rgba(255,255,255,0.75);
  margin-top: -6px;
  font-weight: 600;
}

/* ── DONUT WRAP ── */
.donut-container {
  position: relative;
  width: 100px;
  height: 100px;
  flex-shrink: 0;
  align-self: center;
}
.donut-pct {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 17px;
  font-weight: 900;
  color: #fff;
  pointer-events: none;
  white-space: nowrap;
}

/* ── LEGEND ── */
.legend { display: flex; gap: 10px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: rgba(255,255,255,0.85); font-weight: 600; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── MATERIAL CHIPS ── */
.chips { display: flex; flex-wrap: wrap; gap: 5px; }
.chip {
  background: rgba(255,255,255,0.22);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 20px;
  letter-spacing: 0.1px;
}

/* ── DATES CARD ── */
.dates-card {
  border-radius: 18px;
  padding: 16px;
  width: 145px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.dates-card-title {
  font-size: 12px;
  font-weight: 800;
  color: #333;
  letter-spacing: 0.2px;
}
.dates-section {
  border-radius: 10px;
  padding: 8px 10px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.dates-label {
  font-size: 10px;
  font-weight: 700;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
.dates-value {
  font-size: 12px;
  font-weight: 800;
  color: #222;
  word-break: break-word;
}

/* ── VIEW PANEL ── */
.view-panel { display: none; }
.view-panel.active { display: block; }
</style>
</head>

// ── DATE UTILS ──
function parseDate(s) {
  if (!s || s === 'TBD') return null;
  // dd/mm/yyyy
  let m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return new Date(+m[3], +m[2]-1, +m[1]);
  // dd-Mon (Spanish abbrev)
  const months = {ene:0,feb:1,mar:2,abr:3,may:4,jun:5,jul:6,ago:7,sep:8,oct:9,nov:10,dic:11};
  m = s.match(/^(\d{1,2})-([A-Za-z]+)$/);
  if (m) {
    const mo = months[m[2].toLowerCase()];
    if (mo !== undefined) return new Date(2025, mo, +m[1]);
  }
  return null;
}
function fmtDate(d) {
  if (!d) return '—';
  return d.toLocaleDateString('es-PE', {day:'2-digit', month:'short', year:'numeric'});
}
function minDate(arr) {
  const dates = arr.map(parseDate).filter(Boolean);
  if (!dates.length) return null;
  return new Date(Math.min(...dates));
}
function maxDate(arr) {
  const dates = arr.map(parseDate).filter(Boolean);
  if (!dates.length) return null;
  return new Date(Math.max(...dates));
}

// ── DARKEN COLOR ──
function darken(hex, amt) {
  let c = parseInt(hex.slice(1),16);
  let r = Math.max(0,(c>>16)-amt), g = Math.max(0,((c>>8)&0xff)-amt), b = Math.max(0,(c&0xff)-amt);
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}

// ── CHARTS REGISTRY ──
const chartInstances = {};

function buildDonut(canvasId, pct, accent) {
  if (chartInstances[canvasId]) { chartInstances[canvasId].destroy(); }
  const ctx = document.getElementById(canvasId).getContext('2d');
  chartInstances[canvasId] = new Chart(ctx, {
    type: 'doughnut',
    data: {
      datasets: [{
        data: [pct, 100 - pct],
        backgroundColor: ['rgba(255,255,255,0.92)', 'rgba(255,255,255,0.25)'],
        borderWidth: 0,
        hoverOffset: 0
      }]
    },
    options: {
      responsive: false,
      cutout: '72%',
      animation: { duration: 600 },
      plugins: { legend: { display: false }, tooltip: { enabled: false } }
    }
  });
}

// ── RENDER VIEW (prog or efectividad) ──
function renderView(campaign, viewType) {
  const { colors, categories, dates } = campaign;
  const cid = campaign.name.replace(/[^a-z0-9]/gi,'_');

  // Compute dates
  const kickoff = minDate(dates.orig);
  const projEnd = maxDate([...dates.deadline, ...dates.new_deadline]);

  let html = `<div class="cards-row" id="cards_${cid}_${viewType}">`;

  categories.forEach((cat, ci) => {
    const refVal = viewType === 'prog' ? cat.total_pos : cat.pos_visit;
    const doneVal = viewType === 'prog' ? cat.pos_visit : cat.pos_done;
    const pct = refVal > 0 ? Math.round(doneVal / refVal * 100) : 0;
    const pending = 100 - pct;
    const posLabel = viewType === 'prog' ? `Total POS: ${cat.total_pos.toLocaleString()}` : `POS Visit: ${cat.pos_visit.toLocaleString()}`;
    const canvasId = `chart_${cid}_${viewType}_${ci}`;

    html += `
    <div class="pop-card" style="background:${colors.accent}">
      <div class="pop-card-title">${cat.name}</div>
      <div class="pop-card-pos">${posLabel}</div>
      <div style="display:flex;align-items:center;gap:12px">
        <div class="donut-container">
          <canvas id="${canvasId}" width="100" height="100"></canvas>
          <div class="donut-pct">${pct}%</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <div class="legend">
            <div class="legend-item">
              <div class="legend-dot" style="background:rgba(255,255,255,0.92)"></div>Completed
            </div>
            <div class="legend-item">
              <div class="legend-dot" style="background:rgba(255,255,255,0.25)"></div>Pending
            </div>
          </div>
          <div class="chips">
            ${cat.materials.map(m => `<span class="chip">${m}</span>`).join('')}
          </div>
        </div>
      </div>
    </div>`;
  });

  // Dates card
  html += `
    <div class="dates-card" style="background:${colors.card}">
      <div class="dates-card-title">📅 Campaign Dates</div>
      <div class="dates-section" style="background:${colors.dates}">
        <div class="dates-label">Kick off</div>
        <div class="dates-value">${fmtDate(kickoff)}</div>
      </div>
      <div class="dates-section" style="background:${colors.dates}">
        <div class="dates-label">Projected end</div>
        <div class="dates-value">${fmtDate(projEnd)}</div>
      </div>
    </div>
  </div>`;

  return html;
}

// ── SWITCH TAB ──
function switchTab(campName, viewType) {
  const cid = campName.replace(/[^a-z0-9]/gi,'_');
  const camp = DATA.find(c => c.name === campName);
  const accent = camp.colors.accent;

  // Update tab styles
  ['prog','ef'].forEach(vt => {
    const tab = document.getElementById(`tab_${cid}_${vt}`);
    if (vt === viewType) {
      tab.classList.remove('inactive');
      tab.classList.add('active');
      tab.style.backgroundColor = accent;
      tab.style.borderColor = accent;
      tab.style.color = '#fff';
    } else {
      tab.classList.remove('active');
      tab.classList.add('inactive');
      tab.style.backgroundColor = 'transparent';
      tab.style.borderColor = accent;
      tab.style.color = accent;
    }
  });

  // Show/hide panels
  ['prog','ef'].forEach(vt => {
    const panel = document.getElementById(`panel_${cid}_${vt}`);
    panel.classList.toggle('active', vt === viewType);
  });

  // Build charts for active view
  setTimeout(() => {
    const { categories } = camp;
    categories.forEach((cat, ci) => {
      const refVal = viewType === 'prog' ? cat.total_pos : cat.pos_visit;
      const doneVal = viewType === 'prog' ? cat.pos_visit : cat.pos_done;
      const pct = refVal > 0 ? Math.round(doneVal / refVal * 100) : 0;
      const canvasId = `chart_${cid}_${viewType}_${ci}`;
      buildDonut(canvasId, pct, accent);
    });
  }, 20);
}

        Efectividad de visitas
      </div>
    </div>
    <div id="panel_${cid}_prog" class="view-panel active">${progHTML}</div>
    <div id="panel_${cid}_ef"   class="view-panel">${efHTML}</div>
  `;
  app.appendChild(block);
});

// ── INIT CHARTS for default visible (prog) tabs ──
window.addEventListener('load', () => {
  DATA.forEach(camp => {
    const cid = camp.name.replace(/[^a-z0-9]/gi,'_');
    camp.categories.forEach((cat, ci) => {
      const pct = cat.total_pos > 0 ? Math.round(cat.pos_visit / cat.total_pos * 100) : 0;
      buildDonut(`chart_${cid}_prog_${ci}`, pct, camp.colors.accent);
    });
  });
});
</script>
