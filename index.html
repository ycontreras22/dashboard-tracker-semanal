<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Tracker de Campañas</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: #f0f0f0;
    padding: 28px 20px 48px;
    min-height: 100vh;
  }
  h1 {
    text-align: center;
    font-size: 26px;
    font-weight: 900;
    color: #333;
    margin-bottom: 32px;
    letter-spacing: -0.5px;
  }
  .campaign-block {
    margin-bottom: 36px;
  }
  .campaign-title {
    font-size: 20px;
    font-weight: 900;
    margin-bottom: 12px;
    padding-left: 4px;
  }
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .tab-btn {
    padding: 7px 18px;
    border-radius: 20px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all .18s;
    outline: none;
  }
  .cards-row {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    align-items: flex-start;
  }
  .pop-card {
    border-radius: 18px;
    padding: 16px 16px 14px;
    min-width: 170px;
    max-width: 220px;
    flex: 1 1 170px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .pop-card-title {
    font-size: 12px;
    font-weight: 800;
    text-align: center;
    color: rgba(255,255,255,0.95);
    line-height: 1.3;
  }
  .donut-wrap {
    position: relative;
    width: 100px;
    height: 100px;
    flex-shrink: 0;
  }
  .donut-pct {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 17px;
    font-weight: 900;
    color: white;
    pointer-events: none;
    white-space: nowrap;
  }
  .legend-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
  }
  .legend-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .materials-list {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    justify-content: center;
  }
  .mat-chip {
    background: rgba(255,255,255,0.22);
    color: rgba(255,255,255,0.95);
    border-radius: 20px;
    padding: 3px 9px;
    font-size: 10px;
    font-weight: 700;
  }
  /* Date card */
  .date-card {
    border-radius: 18px;
    width: 145px;
    min-width: 145px;
    max-width: 145px;
    padding: 16px 14px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .date-card-title {
    font-size: 13px;
    font-weight: 900;
    text-align: center;
  }
  .date-item {
    border-radius: 10px;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .date-label {
    font-size: 9px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    opacity: 0.7;
  }
  .date-value {
    font-size: 13px;
    font-weight: 900;
  }
</style>
</head>

// ── helpers ──────────────────────────────────────────────────────────────
function getCampaignColors(name) {
  const n = name.toUpperCase();
  if (/ECLIPSE/.test(n) || /VIBRIN/.test(n)) return { accent:'#e85d45', cardBg:'#fde8e4', dateBg:'#fcd6d0' };
  if (/VELO/.test(n))  return { accent:'#3ab4e0', cardBg:'#daf0fb', dateBg:'#b8e3f5' };
  if (/VUSE/.test(n))  return { accent:'#7c4fcc', cardBg:'#ede4fc', dateBg:'#d9c8f7' };
  return                       { accent:'#5b7fa6', cardBg:'#e4eaf3', dateBg:'#ccd5e3' };
}

function getPSKey(row) {
  return row['PRIMARY/SECONDARY'] || row['PRIMARY/SECONDARY/B2B'] || '';
}

function getCategory(row) {
  const mat = (row.Material || '').toUpperCase();
  const ps  = getPSKey(row).toUpperCase();
  if (/B2B/.test(mat) || /FLYER B2B/.test(mat) || /HOJA CAT/.test(mat) || /ABANICO/.test(mat)) return 'B2B Material';
  if (/B2B/.test(ps)) return 'B2B Material';
  if (ps === 'PRIMARY')   return 'Primary POP';
  if (ps === 'SECONDARY') return 'Secondary POP';
  if (ps === 'SPECIAL')   return 'Special Implementations';
  return 'Secondary POP';
}

function groupByCategory(rows) {
  const cats = {};
  rows.forEach(r => {
    const c = getCategory(r);
    if (!cats[c]) cats[c] = [];
    cats[c].push(r);
  });
  return cats;
}

function sumField(rows, field) {
  return rows.reduce((a, r) => a + (Number(r[field]) || 0), 0);
}

function fmtDate(s) {
  if (!s || s === 'TBD') return '—';
  try {
    const d = new Date(s);
    return d.toLocaleDateString('es-PE', { day:'2-digit', month:'short', year:'numeric' });
  } catch { return s; }
}

function maxDate(a, b) {
  if (!a) return b; if (!b) return a;
  if (a === 'TBD') return b; if (b === 'TBD') return a;
  return a > b ? a : b;
}

function minDate(a, b) {
  if (!a) return b; if (!b) return a;
  if (a === 'TBD') return b; if (b === 'TBD') return a;
  return a < b ? a : b;
}

function getDates(rows) {
  let kickOff = null, projEnd = null;
  rows.forEach(r => {
    kickOff = minDate(kickOff, r['Original Initial Date']);
    const cand = maxDate(r['Deadline'], r['New Deadline']);
    projEnd = maxDate(projEnd, cand);
  });
  return { kickOff, projEnd };
}

// ── chart counter ──
let chartIdx = 0;

function buildCategoryCard(catName, rows, viewMode, accent) {
  const totalPos   = sumField(rows, 'Total POS /Q');
  const visitPos   = sumField(rows, 'POS/Q Visit');
  const donePos    = sumField(rows, 'POS/Q Done');

  let completed, total, pct;
  if (viewMode === 'prog') {
    // Programación: POS_Visit / Total_POS
    completed = visitPos;
    total     = totalPos;
    pct       = total > 0 ? Math.round(completed / total * 100) : 0;
  } else {
    // Efectividad: POS_Done / POS_Visit
    completed = donePos;
    total     = visitPos;
    pct       = total > 0 ? Math.round(completed / total * 100) : 0;
  }
  const pending = Math.max(0, total - completed);

  const mats = [...new Set(rows.map(r => r.Material).filter(Boolean))];
  const cId  = 'chart_' + chartIdx++;
  const posLabel = viewMode === 'prog' ? `${totalPos} POS` : `${visitPos} POS`;

  return `
  <div class="pop-card" style="background:${accent};">
    <div class="pop-card-title">${catName}<br><span style="font-size:10px;opacity:.85">${posLabel}</span></div>
    <div class="donut-wrap">
      <canvas id="${cId}" width="100" height="100"></canvas>
      <div class="donut-pct">${pct}%</div>
    </div>
    <div class="legend-row">
      <div class="legend-item"><div class="legend-dot" style="background:rgba(255,255,255,0.25)"></div>Pending</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgba(255,255,255,0.92)"></div>Completed</div>
    </div>
    <div class="materials-list">
      ${mats.map(m=>`<span class="mat-chip">${m}</span>`).join('')}
    </div>
  </div>
  <script>
  (function(){
    var ctx = document.getElementById('${cId}').getContext('2d');
    new Chart(ctx, {
      type: 'doughnut',
      data: {
        datasets: [{
          data: [${pending}, ${completed}],
          backgroundColor: ['rgba(255,255,255,0.25)', 'rgba(255,255,255,0.92)'],
          borderWidth: 0
        }]
      },
      options: {
        responsive: false,
        cutout: '72%',
        plugins: { legend:{ display:false }, tooltip:{ enabled:false } },
        animation: { duration: 600 }
      }
    });
  })();
  <\/script>`;
}

function buildDateCard(rows, colors) {
  const { kickOff, projEnd } = getDates(rows);
  return `
  <div class="date-card" style="background:${colors.cardBg};">
    <div class="date-card-title" style="color:${colors.accent};">📅 Campaign<br>Dates</div>
    <div class="date-item" style="background:${colors.dateBg};">
      <div class="date-label" style="color:${colors.accent};">Kick off</div>
      <div class="date-value" style="color:${colors.accent};">${fmtDate(kickOff)}</div>
    </div>
    <div class="date-item" style="background:${colors.dateBg};">
      <div class="date-label" style="color:${colors.accent};">Projected end</div>
      <div class="date-value" style="color:${colors.accent};">${fmtDate(projEnd)}</div>
    </div>
  </div>`;
}

function buildCampaignBlock(sheetName, rows) {
  const colors   = getCampaignColors(sheetName);
  const blockId  = 'block_' + sheetName.replace(/\s+/g,'_');
  const catOrder = ['B2B Material','Primary POP','Secondary POP','Special Implementations'];

  function renderView(viewMode) {
    const catMap   = groupByCategory(rows);
    let cards = '';
    catOrder.forEach(cat => {
      if (catMap[cat]) cards += buildCategoryCard(cat, catMap[cat], viewMode, colors.accent);
    });
    cards += buildDateCard(rows, colors);
    return cards;
  }

  return `
  <div class="campaign-block" id="${blockId}">
    <div class="campaign-title" style="color:${colors.accent};">${sheetName}</div>
    <div class="tabs">
      <button class="tab-btn tab-prog active-tab" onclick="switchTab('${blockId}','prog')"
        style="background:${colors.accent};color:#fff;border-color:${colors.accent};">
        Programación de visitas
      </button>
      <button class="tab-btn tab-efec" onclick="switchTab('${blockId}','efec')"
        style="background:transparent;color:${colors.accent};border-color:${colors.accent};">
        Efectividad de visitas
      </button>
    </div>
    <div class="view-prog">
      <div class="cards-row">${renderView('prog')}</div>
    </div>
    <div class="view-efec" style="display:none;">
      <div class="cards-row">${renderView('efec')}</div>
    </div>
  </div>`;
}

// ── render all ──────────────────────────────────────────────────────────
const app = document.getElementById('app');
let html = '';
for (const [name, rows] of Object.entries(RAW)) {
  html += buildCampaignBlock(name, rows);
}
app.innerHTML = html;

// execute inline scripts (Chart.js inits)
app.querySelectorAll('script').forEach(s => {
  const ns = document.createElement('script');
  ns.textContent = s.textContent;
  document.body.appendChild(ns);
});

// ── tab switching ────────────────────────────────────────────────────────
function switchTab(blockId, mode) {
  const block  = document.getElementById(blockId);
  const colors = getCampaignColors(blockId.replace('block_','').replace(/_/g,' '));
  const btnProg = block.querySelector('.tab-prog');
  const btnEfec = block.querySelector('.tab-efec');
  const viewP   = block.querySelector('.view-prog');
  const viewE   = block.querySelector('.view-efec');

  if (mode === 'prog') {
    btnProg.style.background    = colors.accent;
    btnProg.style.color         = '#fff';
    btnEfec.style.background    = 'transparent';
    btnEfec.style.color         = colors.accent;
    viewP.style.display = ''; viewE.style.display = 'none';
  } else {
    btnEfec.style.background    = colors.accent;
    btnEfec.style.color         = '#fff';
    btnProg.style.background    = 'transparent';
    btnProg.style.color         = colors.accent;
    viewE.style.display = ''; viewP.style.display = 'none';
  }
}
</script>
</body>
