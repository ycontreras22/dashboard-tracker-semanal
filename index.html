<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: #f0f0f0; padding: 24px 20px 40px; }
  h1 { text-align: center; font-size: 22px; font-weight: 800; color: #333; margin-bottom: 24px; letter-spacing: -0.3px; }

  .campaign-block { margin-bottom: 28px; }
  .campaign-title { font-size: 15px; font-weight: 800; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; padding-left: 4px; }

  /* TAB ROW */
  .tab-row { display: flex; gap: 6px; margin-bottom: 0; }
  .tab-btn {
    padding: 7px 18px; border-radius: 12px 12px 0 0; border: none; cursor: pointer;
    font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700;
    transition: background 0.18s, color 0.18s;
  }

  /* CARD CONTAINER */
  .cards-wrap {
    border-radius: 0 18px 18px 18px;
    padding: 18px 18px 16px;
    display: none;
  }
  .cards-wrap.active { display: block; }

  .cards-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-start; }

  /* DONUT CARD */
  .pop-card {
    border-radius: 18px;
    padding: 14px 14px 12px;
    min-width: 155px;
    max-width: 195px;
    flex: 1 1 155px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .card-title {
    font-size: 11.5px; font-weight: 800; text-align: center; color: rgba(255,255,255,0.97);
    text-transform: uppercase; letter-spacing: 0.4px; line-height: 1.3;
  }
  .donut-wrap { position: relative; width: 100px; height: 100px; flex-shrink: 0; }
  .donut-wrap canvas { display: block; }
  .donut-pct {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 17px; font-weight: 900; color: white; pointer-events: none;
    white-space: nowrap;
  }
  .card-legend { display: flex; gap: 10px; font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.9); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 3px; vertical-align: middle; }
  .legend-item { display: flex; align-items: center; }

  /* MATERIALS LIST */
  .materials-list { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; width: 100%; }
  .mat-chip {
    font-size: 9.5px; font-weight: 700; padding: 2px 8px; border-radius: 20px;
    background: rgba(255,255,255,0.22); color: rgba(255,255,255,0.95);
    text-transform: uppercase; letter-spacing: 0.2px;
  }

  /* DATES CARD */
  .dates-card {
    border-radius: 18px;
    padding: 14px 14px 12px;
    width: 145px;
    flex: 0 0 145px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .dates-title {
    font-size: 11px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.4px; color: rgba(0,0,0,0.55); text-align: center;
  }
  .date-item { border-radius: 10px; padding: 8px 10px; }
  .date-label { font-size: 9.5px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.3px; opacity: 0.7; }
  .date-value { font-size: 13px; font-weight: 900; margin-top: 2px; }
</style>
</head>

// ─── COLOR MAP ────────────────────────────────────────────────────────────────
function getCampaignColors(name) {
  const n = name.toUpperCase();
  if (n.includes('ECLIPSE') || n.includes('VIBRIN'))
    return { accent: '#e85d45', cardBg: '#fde8e4', datesBg: '#fcd6d0', textDark: '#c04a33' };
  if (n.includes('VELO'))
    return { accent: '#3ab4e0', cardBg: '#daf0fb', datesBg: '#b8e3f5', textDark: '#2390b8' };
  if (n.includes('VUSE'))
    return { accent: '#7c4fcc', cardBg: '#ede4fc', datesBg: '#d9c8f7', textDark: '#6235a8' };
  return { accent: '#5b7fa6', cardBg: '#e4eaf3', datesBg: '#ccd5e3', textDark: '#3d5e80' };
}

// ─── CATEGORY CLASSIFIER ─────────────────────────────────────────────────────
function getCategory(row) {
  const m = row.material.toUpperCase();
  const ps = (row.ps || '').toUpperCase().trim();
  const B2B_KEYWORDS = ['B2B','FLYER B2B','HOJA CATÁLOGO','ABANICO','DIPTICO','DÍPTICO','MENUBOARD'];
  if (B2B_KEYWORDS.some(k => m.includes(k))) return 'B2B Material';
  if (ps === 'PRIMARY') return 'Primary POP';
  if (ps === 'SECONDARY') return 'Secondary POP';
  if (ps === 'SPECIAL') return 'Special Implementations';
  return 'Secondary POP';
}

// ─── DATE HELPERS ─────────────────────────────────────────────────────────────
function parseDate(s) {
  if (!s) return null;
  const [d, m, y] = s.split('/');
  if (!d || !m || !y) return null;
  return new Date(+y, +m - 1, +d);
}
function fmtDate(s) { return s || '—'; }

// ─── AGGREGATE CATEGORIES ────────────────────────────────────────────────────
function aggregateCategories(rows, view) {
  const cats = {};
  for (const row of rows) {
    const cat = getCategory(row);
    if (!cats[cat]) cats[cat] = { total_pos: 0, pos_visit: 0, pos_done: 0, materials: new Set() };
    cats[cat].total_pos += row.total_pos;
    cats[cat].pos_visit += row.pos_visit;
    cats[cat].pos_done += row.pos_done;
    cats[cat].materials.add(row.material);
  }
  // Sort by priority order
  const ORDER = ['B2B Material', 'Primary POP', 'Secondary POP', 'Special Implementations'];
  return ORDER.filter(k => cats[k]).map(k => ({ cat: k, ...cats[k], materials: [...cats[k].materials] }));
}

function getDateInfo(rows) {
  let minInitial = null, maxDeadline = null;
  for (const row of rows) {
    const d1 = parseDate(row.initial_date);
    const d2 = parseDate(row.deadline);
    const d3 = parseDate(row.new_deadline);
    if (d1 && (!minInitial || d1 < minInitial)) minInitial = d1;
    if (d2 && (!maxDeadline || d2 > maxDeadline)) maxDeadline = d2;
    if (d3 && (!maxDeadline || d3 > maxDeadline)) maxDeadline = d3;
  }
  const fmt = (d) => d ? `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}` : null;
  return { kickoff: fmt(minInitial), projected_end: fmt(maxDeadline) };
}

// ─── CHART COUNTER ────────────────────────────────────────────────────────────
let chartIdx = 0;

// ─── BUILD CARD HTML ─────────────────────────────────────────────────────────
function buildDonutCard(catData, view, colors) {
  // Totals
  let ref_total, done, pending;
  if (view === 'prog') {
    ref_total = catData.total_pos;
    done = catData.pos_visit;
    pending = ref_total - done;
  } else {
    ref_total = catData.pos_visit;
    done = catData.pos_done;
    pending = ref_total - done;
  }
  pending = Math.max(0, pending);
  const pct = ref_total > 0 ? Math.round(done / ref_total * 100) : 0;
  const cid = 'c' + (++chartIdx);

  const mats = catData.materials.map(m => `<span class="mat-chip">${m}</span>`).join('');

  return `
    <div class="pop-card" style="background:${colors.accent};">
      <div class="card-title">${catData.cat}<br><span style="font-weight:600;font-size:10px;opacity:0.85;">${ref_total.toLocaleString()} POS</span></div>
      <div class="donut-wrap">
        <canvas id="${cid}" width="100" height="100"></canvas>
        <div class="donut-pct">${pct}%</div>
      </div>
      <div class="card-legend">
        <span class="legend-item"><span class="legend-dot" style="background:rgba(255,255,255,0.25)"></span>Pending</span>
        <span class="legend-item"><span class="legend-dot" style="background:rgba(255,255,255,0.92)"></span>Completed</span>
      </div>
      <div class="materials-list">${mats}</div>
    </div>
    <script>
    (function(){
      var ctx = document.getElementById('${cid}').getContext('2d');
      new Chart(ctx, {
        type:'doughnut',
        data: { datasets:[{ data:[${pending},${done}], backgroundColor:['rgba(255,255,255,0.25)','rgba(255,255,255,0.92)'], borderWidth:0 }] },
        options: { responsive:false, cutout:'72%', plugins:{ legend:{display:false}, tooltip:{enabled:false} }, animation:{duration:600} }
      });
    })();
    <\/script>
  `;
}

function buildDatesCard(rows, colors) {
  const { kickoff, projected_end } = getDateInfo(rows);
  return `
    <div class="dates-card" style="background:${colors.cardBg};">
      <div class="dates-title" style="color:${colors.textDark};">Campaign Dates</div>
      <div class="date-item" style="background:${colors.datesBg};">
        <div class="date-label" style="color:${colors.textDark};">Kick off</div>
        <div class="date-value" style="color:${colors.accent};">${fmtDate(kickoff)}</div>
      </div>
      <div class="date-item" style="background:${colors.datesBg};">
        <div class="date-label" style="color:${colors.textDark};">Projected end</div>
        <div class="date-value" style="color:${colors.accent};">${fmtDate(projected_end)}</div>
      </div>
    </div>
  `;
}

// ─── BUILD CAMPAIGN BLOCK ─────────────────────────────────────────────────────
function buildCampaign(name, rows, idx) {
  const colors = getCampaignColors(name);
  const progCats = aggregateCategories(rows, 'prog');
  const efecCats = aggregateCategories(rows, 'efec');

  const progCards = progCats.map(c => buildDonutCard(c, 'prog', colors)).join('') + buildDatesCard(rows, colors);
  const efecCards = efecCats.map(c => buildDonutCard(c, 'efec', colors)).join('') + buildDatesCard(rows, colors);

  const tab1id = `tab1_${idx}`, tab2id = `tab2_${idx}`;
  const wrap1id = `wrap1_${idx}`, wrap2id = `wrap2_${idx}`;

  return `
    <div class="campaign-block">
      <div class="campaign-title">${name}</div>
      <div class="tab-row">
        <button id="${tab1id}" class="tab-btn" onclick="switchTab('${idx}','prog')"
          style="background:${colors.accent};color:white;">Programación de visitas</button>
        <button id="${tab2id}" class="tab-btn" onclick="switchTab('${idx}','efec')"
          style="background:transparent;color:${colors.accent};">Efectividad de visitas</button>
      </div>
      <div id="${wrap1id}" class="cards-wrap active" style="background:${colors.cardBg};">
        <div class="cards-row">${progCards}</div>
      </div>
      <div id="${wrap2id}" class="cards-wrap" style="background:${colors.cardBg};">
        <div class="cards-row">${efecCards}</div>
      </div>
    </div>
  `;
}

// ─── TAB SWITCHER ─────────────────────────────────────────────────────────────
const CAMPAIGN_NAMES = Object.keys(RAW);
function switchTab(idx, view) {
  const name = CAMPAIGN_NAMES[idx];
  const colors = getCampaignColors(name);
  const t1 = document.getElementById('tab1_' + idx);
  const t2 = document.getElementById('tab2_' + idx);
  const w1 = document.getElementById('wrap1_' + idx);
  const w2 = document.getElementById('wrap2_' + idx);
  if (view === 'prog') {
    t1.style.background = colors.accent; t1.style.color = 'white';
    t2.style.background = 'transparent'; t2.style.color = colors.accent;
    w1.classList.add('active'); w2.classList.remove('active');
  } else {
    t2.style.background = colors.accent; t2.style.color = 'white';
    t1.style.background = 'transparent'; t1.style.color = colors.accent;
    w2.classList.add('active'); w1.classList.remove('active');
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  const container = document.getElementById('main-container');
  CAMPAIGN_NAMES.forEach((name, i) => {
    container.innerHTML += buildCampaign(name, RAW[name], i);
  });
});
</script>
