<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: #f0f0f0; padding: 24px 16px 48px; }
  h1 { text-align: center; font-size: 1.5rem; font-weight: 800; color: #333; margin-bottom: 28px; letter-spacing: -0.5px; }
  
  .campaign-block { margin-bottom: 36px; }
  .campaign-title { font-size: 1.15rem; font-weight: 800; margin-bottom: 12px; padding: 0 4px; }
  
  .tab-bar { display: flex; gap: 8px; margin-bottom: 14px; }
  .tab-btn {
    padding: 7px 18px; border-radius: 20px; border: 2px solid; cursor: pointer;
    font-family: 'Nunito', sans-serif; font-size: 0.82rem; font-weight: 700;
    transition: all 0.18s; white-space: nowrap;
  }
  
  .cards-row {
    display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-start;
  }
  
  .donut-card {
    border-radius: 18px; padding: 16px 14px 14px;
    min-width: 160px; max-width: 200px; flex: 1 1 160px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .card-title {
    font-size: 0.78rem; font-weight: 800; color: #fff; text-align: center;
    line-height: 1.3;
  }
  .donut-wrapper {
    position: relative; width: 100px; height: 100px; flex-shrink: 0;
  }
  .donut-wrapper canvas { position: absolute; top: 0; left: 0; }
  .donut-pct {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 17px; font-weight: 900; color: #fff; pointer-events: none;
    white-space: nowrap;
  }
  .legend-row {
    display: flex; gap: 10px; font-size: 0.7rem; font-weight: 700; color: rgba(255,255,255,0.9);
  }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; margin-right: 3px; vertical-align: middle; }
  .materials-chips { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-top: 2px; }
  .chip {
    background: rgba(255,255,255,0.22); color: #fff;
    border-radius: 10px; padding: 2px 8px;
    font-size: 0.65rem; font-weight: 700; white-space: nowrap;
  }
  
  .date-card {
    border-radius: 18px; padding: 14px 12px;
    width: 145px; flex: 0 0 145px; display: flex; flex-direction: column; gap: 8px;
  }
  .date-card-title {
    font-size: 0.8rem; font-weight: 800; color: #fff; text-align: center;
    margin-bottom: 2px;
  }
  .date-item { border-radius: 10px; padding: 8px 10px; }
  .date-label { font-size: 0.65rem; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.3px; }
  .date-value { font-size: 0.82rem; font-weight: 800; color: #333; margin-top: 2px; }
  
  @media (max-width: 600px) {
    .donut-card { min-width: 140px; }
    .date-card { width: 130px; flex: 0 0 130px; }
  }
</style>

// Color palette per campaign
function getCampaignColors(name) {
  const n = name.toUpperCase();
  if (n.includes('ECLIPSE') || n.includes('VIBRIN')) {
    return { accent: '#e85d45', cardBg: '#fde8e4', dateBg: '#fcd6d0' };
  }
  if (n.includes('VELO')) {
    return { accent: '#3ab4e0', cardBg: '#daf0fb', dateBg: '#b8e3f5' };
  }
  if (n.includes('VUSE')) {
    return { accent: '#7c4fcc', cardBg: '#ede4fc', dateBg: '#d9c8f7' };
  }
  return { accent: '#5b7fa6', cardBg: '#e4eaf3', dateBg: '#ccd5e3' };
}

// Compute aggregated category stats
function computeCategories(rows, mode) {
  // mode: 'visit' → POS_Visit / Total_POS ; 'effectiveness' → POS_Done / POS_Visit
  const cats = {};
  const CAT_ORDER = ['B2B Material', 'Primary POP', 'Secondary POP', 'Special Implementations'];

  rows.forEach(r => {
    const c = r.category;
    if (!cats[c]) cats[c] = { total: 0, visit: 0, done: 0, materials: new Set() };
    cats[c].total += r.total_pos;
    cats[c].visit += r.pos_visit;
    cats[c].done += r.pos_done;
    cats[c].materials.add(r.material);
  });

  return CAT_ORDER.filter(c => cats[c]).map(c => {
    const d = cats[c];
    let pct, ref;
    if (mode === 'visit') {
      pct = d.total > 0 ? Math.round(d.visit / d.total * 100) : 0;
      ref = d.total;
    } else {
      pct = d.visit > 0 ? Math.round(d.done / d.visit * 100) : 0;
      ref = d.visit;
    }
    return { name: c, pct, ref, completed: mode === 'visit' ? d.visit : d.done,
             total: mode === 'visit' ? d.total : d.visit,
             materials: [...d.materials] };
  });
}

function getDateInfo(rows) {
  const inits = rows.map(r => r.init_date).filter(Boolean).sort();
  const ends = [...rows.map(r => r.deadline).filter(Boolean),
                 ...rows.map(r => r.new_deadline).filter(Boolean)].sort();
  return {
    kickoff: inits.length ? formatDate(inits[0]) : '—',
    projEnd: ends.length ? formatDate(ends[ends.length - 1]) : '—'
  };
}

function formatDate(d) {
  if (!d) return '—';
  const [y, m, day] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${parseInt(day)} ${months[parseInt(m)-1]} ${y}`;
}

let chartCounter = 0;

function renderCampaignBlock(name, rows, colors) {
  const blockId = 'block_' + name.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');
  const dates = getDateInfo(rows);

  return `
  <div class="campaign-block" id="${blockId}">
    <div class="campaign-title" style="color:${colors.accent}">${name}</div>
    <div class="tab-bar">
      <button class="tab-btn tab-visit" 
        data-block="${blockId}" data-tab="visit"
        style="border-color:${colors.accent}; background:${colors.accent}; color:#fff;"
        onclick="switchTab('${blockId}','visit','${colors.accent}','${colors.cardBg}','${colors.dateBg}')">
        Programación de visitas
      </button>
      <button class="tab-btn tab-eff"
        data-block="${blockId}" data-tab="eff"
        style="border-color:${colors.accent}; background:transparent; color:${colors.accent};"
        onclick="switchTab('${blockId}','eff','${colors.accent}','${colors.cardBg}','${colors.dateBg}')">
        Efectividad de visitas
      </button>
    </div>
    <div class="tab-content" id="${blockId}_visit">
      ${renderCardsRow(rows, 'visit', colors, dates, blockId+'_visit')}
    </div>
    <div class="tab-content" id="${blockId}_eff" style="display:none;">
      ${renderCardsRow(rows, 'eff', colors, dates, blockId+'_eff')}
    </div>
  </div>`;
}

function renderCardsRow(rows, mode, colors, dates, containerId) {
  const cats = computeCategories(rows, mode);
  let html = `<div class="cards-row" id="${containerId}_row">`;
  
  cats.forEach((cat, i) => {
    const cid = `chart_${++chartCounter}`;
    html += `
    <div class="donut-card" style="background:${colors.accent};" data-cid="${cid}" 
         data-pct="${cat.pct}" data-completed="${cat.completed}" data-ref="${cat.total}">
      <div class="card-title">${cat.name}<br><span style="font-weight:600;opacity:0.85;font-size:0.72rem">${cat.ref} POS</span></div>
      <div class="donut-wrapper">
        <canvas id="${cid}" width="100" height="100"></canvas>
        <div class="donut-pct">${cat.pct}%</div>
      </div>
      <div class="legend-row">
        <span><span class="legend-dot" style="background:rgba(255,255,255,0.25)"></span>Pending</span>
        <span><span class="legend-dot" style="background:rgba(255,255,255,0.92)"></span>Completed</span>
      </div>
      <div class="materials-chips">
        ${cat.materials.map(m => `<span class="chip">${m}</span>`).join('')}
      </div>
    </div>`;
  });

  // Date card
  html += `
    <div class="date-card" style="background:${colors.accent};">
      <div class="date-card-title">📅 Campaign Dates</div>
      <div class="date-item" style="background:${colors.dateBg}">
        <div class="date-label">Kick off</div>
        <div class="date-value">${dates.kickoff}</div>
      </div>
      <div class="date-item" style="background:${colors.dateBg}">
        <div class="date-label">Projected end date</div>
        <div class="date-value">${dates.projEnd}</div>
      </div>
    </div>`;

  html += `</div>`;
  return html;
}

function switchTab(blockId, tab, accent, cardBg, dateBg) {
  const visitEl = document.getElementById(blockId + '_visit');
  const effEl = document.getElementById(blockId + '_eff');
  const visitBtn = document.querySelector(`#${blockId} .tab-visit`);
  const effBtn = document.querySelector(`#${blockId} .tab-eff`);

  if (tab === 'visit') {
    visitEl.style.display = '';
    effEl.style.display = 'none';
    visitBtn.style.background = accent; visitBtn.style.color = '#fff';
    effBtn.style.background = 'transparent'; effBtn.style.color = accent;
  } else {
    visitEl.style.display = 'none';
    effEl.style.display = '';
    effBtn.style.background = accent; effBtn.style.color = '#fff';
    visitBtn.style.background = 'transparent'; visitBtn.style.color = accent;
  }
}

function initCharts() {
  document.querySelectorAll('[data-cid]').forEach(card => {
    const cid = card.dataset.cid;
    const pct = parseInt(card.dataset.pct);
    const canvas = document.getElementById(cid);
    if (!canvas || canvas._chartInited) return;
    canvas._chartInited = true;
    new Chart(canvas, {
      type: 'doughnut',
      data: {
        datasets: [{
          data: [100 - pct, pct],
          backgroundColor: ['rgba(255,255,255,0.25)', 'rgba(255,255,255,0.92)'],
          borderWidth: 0,
          hoverOffset: 0
        }]
      },
      options: {
        responsive: false,
        cutout: '72%',
        plugins: { legend: { display: false }, tooltip: { enabled: false } },
        animation: { duration: 600 },
        events: []
      }
    });
  });
}

// Build HTML
const app = document.getElementById('app');
let html = '';
Object.entries(DATA).forEach(([name, rows]) => {
  const colors = getCampaignColors(name);
  html += renderCampaignBlock(name, rows, colors);
});
app.innerHTML = html;

// Init all charts
initCharts();

// Re-init charts when tab switches (charts in hidden tabs need re-render)
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => setTimeout(initCharts, 50));
});
</script>
